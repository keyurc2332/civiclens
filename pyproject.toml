[tool.black]
line-length = 110
target-version = ["py310"]

[tool.ruff]
line-length = 110
target-version = "py310"

[tool.ruff.lint]
# Keep the ruleset pragmatic: errors + pyflakes + import sorting.
select = ["E", "F", "I"]
ignore = [
    "E402",  # module-level import not at top -- our scripts do sys.path.insert before imports, deliberately
    "E501",  # line length handled by black
]
[tool.pytest.ini_options]
pythonpath = ["."]